<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="EPIC Tracker">
<title>EPIC Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--red:#e8001e;--gold:#f5c842;--dark:#0a0a0a;--card:#141414;--card2:#1e1e1e;--border:#2a2a2a;--text:#f0f0f0;--muted:#888;--green:#22c55e}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--dark);color:var(--text);font-family:'DM Sans',system-ui,sans-serif;min-height:100vh;overflow-x:hidden}
input,textarea,button{font-family:inherit}
input:focus,textarea:focus{outline:none;border-color:var(--red)!important}
::-webkit-scrollbar{display:none}
.app{max-width:480px;margin:0 auto}
.header{background:linear-gradient(135deg,#0d0d0d 0%,#1a0000 100%);padding:16px 16px 12px;border-bottom:1px solid var(--border)}
.header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.athlete-name{font-family:impact,'Arial Black',sans-serif;font-size:18px;letter-spacing:2px;color:var(--gold)}
.chip{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;background:rgba(232,0,30,.15);color:var(--red)}
.nav{background:#0d0d0d;border-bottom:1px solid var(--border);display:flex;position:sticky;top:0;z-index:100}
.nav-btn{flex:1;padding:12px 4px 8px;background:none;border:none;color:var(--muted);font-size:10px;font-weight:600;letter-spacing:.5px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;border-bottom:2px solid transparent;transition:color .2s}
.nav-btn.active{color:var(--red);border-bottom-color:var(--red)}
.page{padding:16px 16px 80px;display:none}
.page.active{display:block}
.section-title{font-family:impact,'Arial Black',sans-serif;font-size:18px;letter-spacing:2px;color:var(--red);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center}
.stat-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.stat-val{font-family:impact,'Arial Black',sans-serif;font-size:30px;line-height:1}
.stat-goal{font-size:11px;color:var(--muted);margin-top:2px}
.stat-bar{height:3px;background:var(--border);border-radius:2px;margin-top:8px;overflow:hidden}
.stat-bar-fill{height:100%;border-radius:2px;transition:width .5s}
.week-sel{display:flex;gap:8px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px}
.week-btn{flex-shrink:0;padding:7px 14px;background:var(--card);border:1px solid var(--border);border-radius:20px;color:var(--muted);font-size:13px;cursor:pointer}
.week-btn.active{background:var(--red);border-color:var(--red);color:white}
.day-tabs{display:flex;gap:6px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px}
.day-tab{flex-shrink:0;padding:7px 13px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--muted);font-size:13px;font-weight:500;cursor:pointer}
.day-tab.active{background:var(--card2);border-color:var(--red);color:var(--text)}
.day-tab.done{border-color:var(--green)}
.ex-card{background:var(--card2);border:1px solid var(--border);border-radius:10px;margin-bottom:10px;overflow:hidden}
.ex-header{padding:12px 14px;display:flex;align-items:center;cursor:pointer;gap:6px}
.ex-id{font-family:impact,'Arial Black',sans-serif;font-size:14px;color:var(--red);letter-spacing:1px;flex-shrink:0}
.ex-name{font-size:14px;font-weight:600;flex:1}
.ex-meta{font-size:11px;color:var(--muted);flex-shrink:0}
.ex-note{font-size:11px;color:var(--gold);padding:0 14px 6px}
.ex-body{padding:0 14px 14px;display:none}
.ex-body.open{display:block}
.set-grid{display:grid;grid-template-columns:28px 1fr 1fr 34px;gap:8px;align-items:center;margin-bottom:8px}
.set-num{font-family:impact,'Arial Black',sans-serif;font-size:18px;color:var(--muted);text-align:center}
.set-input{background:var(--dark);border:1px solid var(--border);border-radius:8px;padding:9px 6px;color:var(--text);font-size:15px;text-align:center;width:100%}
.set-check{width:32px;height:32px;border-radius:50%;border:2px solid var(--border);background:none;color:var(--muted);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.set-check.done{background:var(--green);border-color:var(--green);color:white}
.set-labels{display:grid;grid-template-columns:28px 1fr 1fr 34px;gap:8px;margin-bottom:6px}
.set-lbl{font-size:10px;color:var(--muted);text-align:center;text-transform:uppercase;letter-spacing:.5px}
.rpe-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.rpe-lbl{font-size:10px;color:var(--muted);width:100%;margin-bottom:2px}
.rpe-btn{padding:5px 10px;background:var(--dark);border:1px solid var(--border);border-radius:6px;color:var(--muted);font-size:12px;cursor:pointer}
.rpe-btn.active{background:var(--red);border-color:var(--red);color:white}
.add-ex-btn{display:flex;align-items:center;gap:6px;background:none;border:1px dashed var(--border);border-radius:8px;color:var(--muted);font-size:12px;cursor:pointer;padding:6px 12px;margin-bottom:8px;width:100%}
.adhoc-card{background:#1a1a2e;border:1px dashed var(--green);border-radius:10px;margin-bottom:10px;overflow:hidden}
.timer-box{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:12px;margin-top:10px;text-align:center;display:none}
.timer-box.show{display:block}
.timer-val{font-family:impact,'Arial Black',sans-serif;font-size:40px;letter-spacing:2px;color:var(--gold)}
.btn{padding:12px 20px;border-radius:10px;border:none;font-size:14px;font-weight:600;cursor:pointer;width:100%;margin-top:10px}
.btn-red{background:var(--red);color:white}
.btn-gold{background:var(--gold);color:#000}
.btn-outline{background:none;border:1px solid var(--border);color:var(--text)}
.btn-danger{background:none;border:1px solid var(--red);color:var(--red)}
.f-input{background:var(--dark);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-size:14px;width:100%}
.setting-row{display:flex;align-items:center;justify-content:space-between;padding:13px 0;border-bottom:1px solid var(--border)}
.toggle{width:44px;height:24px;background:var(--border);border-radius:12px;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0}
.toggle.on{background:var(--red)}
.toggle-knob{width:18px;height:18px;background:white;border-radius:50%;position:absolute;top:3px;left:3px;transition:left .2s}
.toggle.on .toggle-knob{left:23px}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;align-items:flex-end}
.modal-overlay.show{display:flex}
.modal{background:var(--card);border-radius:20px 20px 0 0;padding:22px 18px;width:100%;max-height:85vh;overflow-y:auto}
.modal-title{font-family:impact,'Arial Black',sans-serif;font-size:22px;letter-spacing:2px;color:var(--red);margin-bottom:16px}
.modal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.modal-close{background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer}
.field-label{font-size:12px;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.progress-row{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.progress-bar-wrap{flex:1;background:var(--border);border-radius:4px;height:8px;overflow:hidden}
.progress-bar-fill{height:100%;border-radius:4px;transition:width .5s}
.log-entry{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px}
.empty{text-align:center;padding:40px 20px;color:var(--muted)}
.save-status{font-size:10px;color:var(--muted)}
textarea{background:var(--dark);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-size:14px;width:100%;resize:none}
input[type=date]{color-scheme:dark}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
</style>
</head>
<body>
<div class="app" id="app"></div>

<!-- MODALS -->
<div class="modal-overlay" id="completeModal">
  <div class="modal">
    <div class="modal-title">Session Complete! 💪</div>
    <div id="completeSummary"></div>
    <div style="margin-bottom:12px">
      <div class="field-label">Session Date</div>
      <input type="date" class="f-input" id="sessionDate" style="color-scheme:dark">
    </div>
    <div style="margin-bottom:12px">
      <div class="field-label">Session Notes</div>
      <textarea id="sessionNotes" rows="3" placeholder="How did it feel?"></textarea>
    </div>
    <button class="btn btn-gold" onclick="saveSession()">Save Session</button>
    <button class="btn btn-outline" onclick="closeModal('completeModal')">Cancel</button>
  </div>
</div>

<div class="modal-overlay" id="addExModal">
  <div class="modal">
    <div class="modal-hdr"><div class="modal-title">Add Exercise</div><button class="modal-close" onclick="closeModal('addExModal')">✕</button></div>
    <div style="margin-bottom:12px"><div class="field-label">Exercise Name</div><input class="f-input" id="ae-name" placeholder="e.g. Hip Thrust"></div>
    <div class="grid3" style="margin-bottom:12px">
      <div><div class="field-label">Sets</div><input class="f-input" type="number" id="ae-sets" value="2"></div>
      <div><div class="field-label">Reps</div><input class="f-input" id="ae-reps" placeholder="10"></div>
      <div><div class="field-label">Weight kg</div><input class="f-input" type="number" id="ae-weight" placeholder="RPE"></div>
    </div>
    <div style="margin-bottom:16px"><div class="field-label">Notes</div><input class="f-input" id="ae-note" placeholder="Optional"></div>
    <button class="btn btn-red" onclick="saveAddEx()">Add Exercise</button>
    <button class="btn btn-outline" onclick="closeModal('addExModal')">Cancel</button>
  </div>
</div>

<div class="modal-overlay" id="editExModal">
  <div class="modal">
    <div class="modal-hdr"><div class="modal-title">Edit Exercise</div><button class="modal-close" onclick="closeModal('editExModal')">✕</button></div>
    <div style="margin-bottom:12px"><div class="field-label">Exercise Name</div><input class="f-input" id="ee-name"></div>
    <div class="grid2" style="margin-bottom:12px">
      <div><div class="field-label">Sets</div><input class="f-input" type="number" id="ee-sets"></div>
      <div><div class="field-label">Reps</div><input class="f-input" id="ee-reps"></div>
    </div>
    <div style="margin-bottom:12px"><div class="field-label">Notes / Cues</div><input class="f-input" id="ee-note"></div>
    <div style="margin-bottom:16px">
      <div class="field-label">Programmed Weight per Week (kg / RPE / BW)</div>
      <div class="grid2" style="gap:8px">
        <div><div style="font-size:11px;color:var(--muted);margin-bottom:4px">Wk 1</div><input class="f-input" id="ee-w0"></div>
        <div><div style="font-size:11px;color:var(--muted);margin-bottom:4px">Wk 2</div><input class="f-input" id="ee-w1"></div>
        <div><div style="font-size:11px;color:var(--muted);margin-bottom:4px">Wk 3</div><input class="f-input" id="ee-w2"></div>
        <div><div style="font-size:11px;color:var(--muted);margin-bottom:4px">Reload</div><input class="f-input" id="ee-w3"></div>
      </div>
    </div>
    <button class="btn btn-red" onclick="saveEditEx()">Save Changes</button>
    <button class="btn btn-outline" style="border-color:#555;color:var(--muted);font-size:13px" onclick="resetEditEx()">Reset to Original</button>
  </div>
</div>

let timerInterval=null,timerSecs=0,addExAfterIdx=-1,editExTarget={dIdx:0,eIdx:0};

function load(){try{const d=localStorage.getItem("epicV4");if(d)S={...DS(),...JSON.parse(d)};}catch(e){}}
function save(){try{localStorage.setItem("epicV4",JSON.stringify(S));setSaveStatus("ok","✓ Saved "+new Date().toLocaleTimeString());}catch(e){setSaveStatus("err","✗ Save failed");}}
function setSaveStatus(cls,txt){const el=document.getElementById("saveStatus");if(!el)return;el.style.color=cls==="ok"?"var(--green)":cls==="err"?"var(--red)":"var(--muted)";el.textContent=txt;}

function getProgram(){return ORIG_PROGRAM.map((day,dIdx)=>({...day,exercises:day.exercises.map((ex,eIdx)=>{const k=`${dIdx}-${eIdx}`;return S.customEx[k]?{...ex,...S.customEx[k]}:ex;})}));}
function getWeight(w,d,e){const k=`${w}-${d}-${e}`;return S.customW[k]!==undefined?S.customW[k]:(ORIG_WEIGHTS[w]?.[d]?.[e]||"");}
function sKey(e,s){return `${S.week}-${S.day}-${e}-${s}`;}
function getSet(e,s){return S.sets[sKey(e,s)]||{};}
function adKey(){return `adex-${S.week}-${S.day}`;}
function getAdEx(){return S.adEx[adKey()]||[];}
function isDayDone(dIdx){const p=getProgram();return p[dIdx].exercises.every((ex,eIdx)=>Array.from({length:ex.sets},(_,s)=>S.sets[`${S.week}-${dIdx}-${eIdx}-${s}`]?.done).every(Boolean));}
function pct(v,g){return Math.min(100,Math.round(v/g*100));}

// ===== ACTIONS =====
function showPage(id){S.page=id;save();render();}
function selWeek(i){S.week=i;save();render();}
function selDay(i){S.day=i;save();render();}
function toggleEx(eIdx){const k=`${S.day}-${eIdx}`;S.openEx[k]=!S.openEx[k];render();}
function updSet(e,s,field,val){if(!S.sets[sKey(e,s)])S.sets[sKey(e,s)]={};S.sets[sKey(e,s)][field]=val;save();}
function togSet(e,s){if(!S.sets[sKey(e,s)])S.sets[sKey(e,s)]={};S.sets[sKey(e,s)].done=!S.sets[sKey(e,s)].done;save();if(S.sets[sKey(e,s)].done&&S.settings.timer)showTimer();render();}
function setRPE(e,r){S.rpe[`${S.week}-${S.day}-${e}`]=r;save();render();}

function showTimer(){S._timerShow=true;startTimer(120);}
function startTimer(secs){clearInterval(timerInterval);timerSecs=secs;document.getElementById("timerBox")?.classList.add("show");updateTimerDisplay();timerInterval=setInterval(()=>{timerSecs--;updateTimerDisplay();if(timerSecs<=0){clearInterval(timerInterval);const el=document.getElementById("timerVal");if(el)el.textContent="GO!";setTimeout(()=>{document.getElementById("timerBox")?.classList.remove("show");},2000);}},1000);}
function stopTimer(){clearInterval(timerInterval);document.getElementById("timerBox")?.classList.remove("show");}
function updateTimerDisplay(){const el=document.getElementById("timerVal");if(el){const m=Math.floor(timerSecs/60),s=timerSecs%60;el.textContent=`${m}:${String(s).padStart(2,"0")}`;}}

function openModal(id){document.getElementById(id).classList.add("show");}
function closeModal(id){document.getElementById(id).classList.remove("show");}

function openCompleteModal(){
  const prog=getProgram(),day=prog[S.day];
  let vol=0,sets=0;
  day.exercises.forEach((ex,eIdx)=>{for(let s=0;s<ex.sets;s++){const d=getSet(eIdx,s);if(d.weight&&d.reps){vol+=parseFloat(d.weight)*parseInt(d.reps);sets++;}}});
  document.getElementById("completeSummary").innerHTML=`
    <div style="display:flex;gap:12px;margin-bottom:14px">
      <div class="stat-card" style="flex:1;padding:10px"><div class="stat-label">Volume</div><div class="stat-val">${vol.toLocaleString()}</div><div class="stat-goal">kg total</div></div>
      <div class="stat-card" style="flex:1;padding:10px"><div class="stat-label">Sets</div><div class="stat-val">${sets}</div><div class="stat-goal">logged</div></div>
    </div>`;
  const today=new Date().toISOString().split("T")[0];
  document.getElementById("sessionDate").value=today;
  document.getElementById("sessionNotes").value="";
  openModal("completeModal");
}

function saveSession(){
  const prog=getProgram(),day=prog[S.day];
  const dateVal=document.getElementById("sessionDate").value;
  const notes=document.getElementById("sessionNotes").value;
  const date=dateVal?new Date(dateVal+"T12:00:00").toLocaleDateString("en-AU"):new Date().toLocaleDateString("en-AU");
  S.sessions.unshift({week:S.week,day:S.day,dayName:day.name,date,notes,exercises:day.exercises.map((ex,eIdx)=>({name:ex.name,sets:Array.from({length:ex.sets},(_,s)=>getSet(eIdx,s))}))});
  save();closeModal("completeModal");render();
}

function openAddExModal(afterIdx){addExAfterIdx=afterIdx;document.getElementById("ae-name").value="";document.getElementById("ae-sets").value="2";document.getElementById("ae-reps").value="";document.getElementById("ae-weight").value="";document.getElementById("ae-note").value="";openModal("addExModal");}
function saveAddEx(){
  const name=document.getElementById("ae-name").value.trim();if(!name)return;
  const entry={name,sets:document.getElementById("ae-sets").value,reps:document.getElementById("ae-reps").value,weight:document.getElementById("ae-weight").value,note:document.getElementById("ae-note").value,afterIdx:addExAfterIdx};
  const k=adKey();if(!S.adEx[k])S.adEx[k]=[];S.adEx[k].push(entry);
  save();closeModal("addExModal");render();
}
function removeAdEx(i){const k=adKey();S.adEx[k].splice(i,1);save();render();}

function openEditModal(dIdx,eIdx){
  editExTarget={dIdx,eIdx};
  const prog=getProgram();const ex=prog[dIdx].exercises[eIdx];
  document.getElementById("ee-name").value=ex.name;
  document.getElementById("ee-sets").value=ex.sets;
  document.getElementById("ee-reps").value=ex.reps;
  document.getElementById("ee-note").value=ex.note||"";
  [0,1,2,3].forEach(w=>{document.getElementById(`ee-w${w}`).value=getWeight(w,dIdx,eIdx);});
  openModal("editExModal");
}
function saveEditEx(){
  const{dIdx,eIdx}=editExTarget;const k=`${dIdx}-${eIdx}`;
  S.customEx[k]={name:document.getElementById("ee-name").value,sets:parseInt(document.getElementById("ee-sets").value)||2,reps:document.getElementById("ee-reps").value,note:document.getElementById("ee-note").value,id:ORIG_PROGRAM[dIdx].exercises[eIdx].id};
  [0,1,2,3].forEach(w=>{S.customW[`${w}-${dIdx}-${eIdx}`]=document.getElementById(`ee-w${w}`).value;});
  save();closeModal("editExModal");render();
}
function resetEditEx(){
  const{dIdx,eIdx}=editExTarget;const k=`${dIdx}-${eIdx}`;
  delete S.customEx[k];[0,1,2,3].forEach(w=>delete S.customW[`${w}-${dIdx}-${eIdx}`]);
  save();closeModal("editExModal");render();
}

function saveSetting(key,val){S.settings[key]=val;save();}
function saveGoal(key,val){S.goals[key]=parseFloat(val)||0;save();render();}
function savePR(key,val){S.prs[key]=parseFloat(val)||0;save();render();}
function toggleTimer(){S.settings.timer=!S.settings.timer;save();document.getElementById("timerToggle").classList.toggle("on",S.settings.timer);document.getElementById("timerToggle").querySelector(".toggle-knob").style.left=S.settings.timer?"23px":"3px";}

function copyBackup(){const d=JSON.stringify(S);if(navigator.clipboard){navigator.clipboard.writeText(d).then(()=>setSaveStatus("ok","✓ Copied!"));}else{prompt("Copy this:",d);}}
function restoreBackup(){const txt=document.getElementById("restoreInput").value.trim();try{const p=JSON.parse(txt);if(p.sessions!==undefined){S={...DS(),...p};save();render();document.getElementById("restoreInput").value="";}else alert("Invalid backup data");}catch{alert("Invalid backup data");}}

// ===== RENDER =====
function render(){
  const prog=getProgram(),day=prog[S.day];
  const total=S.prs.squat+S.prs.bench+S.prs.dead,goalTotal=S.goals.squat+S.goals.bench+S.goals.dead;
  const date=new Date().toLocaleDateString("en-AU",{weekday:"short",day:"numeric",month:"short"});
  const page=S.page||"train";

  document.getElementById("app").innerHTML=`
  <div class="header">
    <div class="header-top">
      <img src="${LOGO}" alt="EPIC" style="height:44px;width:auto">
      <div style="text-align:right">
        <div style="font-size:12px;color:var(--muted)">${date}</div>
        <div id="saveStatus" class="save-status" style="color:${S.sessions.length?"var(--green)":"var(--muted)"}">${S.sessions.length?"✓ "+S.sessions.length+" session(s) saved":"No sessions yet"}</div>
      </div>
    </div>
    <div style="display:flex;align-items:baseline;gap:10px;margin-top:4px">
      <div class="athlete-name">${S.settings.name}</div>
      <div class="chip">${S.settings.block}</div>
    </div>
  </div>
  <div class="nav">
    ${[["🏋️","TRAIN","train"],["📈","PROGRESS","progress"],["📋","LOG","log"],["⚙️","SETTINGS","settings"]].map(([icon,label,id])=>`<button class="nav-btn${page===id?" active":""}" onclick="showPage('${id}')"><span style="font-size:18px">${icon}</span>${label}</button>`).join("")}
  </div>

  <!-- TRAIN PAGE -->
  <div class="page${page==="train"?" active":""}" id="page-train">
    <div class="stats-grid" style="margin-top:16px">
      ${[["SQUAT","squat",false],["BENCH","bench",false],["DEADLIFT","dead",false],["TOTAL","total",true]].map(([lbl,key,gold])=>{
        const val=key==="total"?total:S.prs[key],goal=key==="total"?goalTotal:S.goals[key],p=pct(val,goal);
        return `<div class="stat-card"><div class="stat-label">${lbl}</div><div class="stat-val" style="color:${gold?"var(--gold)":"var(--text)"}">${val}</div><div class="stat-goal">Goal: ${goal}kg</div><div class="stat-bar"><div class="stat-bar-fill" style="width:${p}%;background:${gold?"var(--gold)":"var(--red)"}"></div></div></div>`;
      }).join("")}
    </div>
    <div class="week-sel">${WEEKS.map((w,i)=>`<button class="week-btn${S.week===i?" active":""}" onclick="selWeek(${i})">${w}</button>`).join("")}</div>
    <div class="day-tabs">${prog.map((d,i)=>`<div class="day-tab${S.day===i?" active":""}${isDayDone(i)?" done":""}" onclick="selDay(${i})">Day ${i+1}${isDayDone(i)?" ✓":""}</div>`).join("")}</div>

    <button class="add-ex-btn" onclick="openAddExModal(-1)"><span style="color:var(--green);font-size:16px">＋</span> Add exercise here</button>
    ${day.exercises.map((ex,eIdx)=>{
      const progW=getWeight(S.week,S.day,eIdx),isRPE=progW==="RPE",isBW=progW==="BW",hasTarget=progW&&!isRPE&&!isBW;
      const isOpen=S.openEx[`${S.day}-${eIdx}`]!==false&&(S.openEx[`${S.day}-${eIdx}`]===true||eIdx===0);
      return `<div class="ex-card">
        <div class="ex-header" onclick="toggleEx(${eIdx})">
          <span class="ex-id">${ex.id}</span><span class="ex-name">${ex.name}</span>
          <span class="ex-meta">${ex.sets}×${ex.reps}${hasTarget?` · ${progW}kg`:""}</span>
          <button onclick="event.stopPropagation();openEditModal(${S.day},${eIdx})" style="background:none;border:1px solid var(--border);color:var(--muted);border-radius:6px;padding:2px 7px;font-size:11px;cursor:pointer;flex-shrink:0;margin-left:4px">✏️</button>
          <span style="color:var(--muted);font-size:12px;margin-left:4px">${isOpen?"▴":"▾"}</span>
        </div>
        ${ex.note?`<div class="ex-note">📝 ${ex.note}</div>`:""}
        ${hasTarget?`<div class="ex-note">🎯 Programmed: <strong>${progW}kg</strong></div>`:""}
        ${isRPE?`<div class="ex-note" style="color:var(--muted)">⚡ RPE-guided</div>`:""}
        <div class="ex-body${isOpen?" open":""}">
          <div class="set-labels"><div class="set-lbl"></div><div class="set-lbl">Weight</div><div class="set-lbl">Reps</div><div class="set-lbl"></div></div>
          ${Array.from({length:ex.sets},(_,s)=>{const d=getSet(eIdx,s),ph=isBW?"BW":isRPE?"RPE":hasTarget?progW:"kg";
            return `<div class="set-grid"><div class="set-num">${s+1}</div>
              <input class="set-input" type="${isRPE||isBW?"text":"number"}" inputmode="decimal" placeholder="${ph}" value="${d.weight||""}" onchange="updSet(${eIdx},${s},'weight',this.value)">
              <input class="set-input" type="number" inputmode="numeric" placeholder="${ex.reps}" value="${d.reps||""}" onchange="updSet(${eIdx},${s},'reps',this.value)">
              <button class="set-check${d.done?" done":""}" onclick="togSet(${eIdx},${s})">✓</button></div>`;
          }).join("")}
          <div class="rpe-row"><div class="rpe-lbl">RPE</div>
            ${[6,7,7.5,8,8.5,9,9.5,10].map(r=>`<button class="rpe-btn${S.rpe[`${S.week}-${S.day}-${eIdx}`]===r?" active":""}" onclick="setRPE(${eIdx},${r})">${r}</button>`).join("")}
          </div>
        </div>
      </div>
      ${getAdEx().filter(ae=>ae.afterIdx===eIdx).map((ae,i)=>{const gi=getAdEx().indexOf(ae);return `<div class="adhoc-card"><div class="ex-header"><span class="ex-id" style="color:var(--green)">+</span><span class="ex-name">${ae.name}</span><span class="ex-meta">${ae.sets}×${ae.reps}${ae.weight?` · ${ae.weight}kg`:""}</span><button onclick="removeAdEx(${gi})" style="background:none;border:none;color:var(--muted);font-size:16px;cursor:pointer;margin-left:auto">✕</button></div>${ae.note?`<div class="ex-note" style="color:var(--green)">📝 ${ae.note}</div>`:""}</div>`;}).join("")}
      <button class="add-ex-btn" onclick="openAddExModal(${eIdx})"><span style="color:var(--green);font-size:16px">＋</span> Add exercise here</button>`;
    }).join("")}

    <div class="timer-box" id="timerBox">
      <div style="font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase">Rest Timer</div>
      <div class="timer-val" id="timerVal">2:00</div>
      <div style="display:flex;gap:8px;justify-content:center;margin-top:8px">
        ${[90,120,180].map(t=>`<button onclick="startTimer(${t})" style="padding:5px 10px;background:none;border:1px solid var(--border);color:var(--text);border-radius:6px;cursor:pointer;font-size:12px">${t<120?t+"s":t/60+"min"}</button>`).join("")}
        <button onclick="stopTimer()" style="padding:5px 10px;background:none;border:1px solid var(--border);color:var(--muted);border-radius:6px;cursor:pointer;font-size:12px">✕</button>
      </div>
    </div>
    <button class="btn btn-red" onclick="openCompleteModal()">✓ Complete Session</button>
  </div>

  <!-- PROGRESS PAGE -->
  <div class="page${page==="progress"?" active":""}" id="page-progress">
    <div style="margin-top:16px">
      <div class="section-title">📊 Lift Progress</div>
      <div class="card">
        ${[["Squat","squat","var(--red)"],["Bench","bench","var(--red)"],["Deadlift","dead","var(--red)"],["Total","total","var(--gold)"]].map(([lbl,key,color])=>{
          const val=key==="total"?total:S.prs[key],goal=key==="total"?goalTotal:S.goals[key],p=pct(val,goal);
          return `<div class="progress-row"><div style="font-size:13px;font-weight:500;width:70px;flex-shrink:0;color:${key==="total"?"var(--gold)":"var(--text)"}">${lbl}</div><div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${p}%;background:${color}"></div></div><div style="font-family:impact,'Arial Black',sans-serif;font-size:16px;color:var(--gold);width:42px;text-align:right">${p}%</div></div>`;
        }).join("")}
      </div>
      <div class="section-title">🗓️ Sessions This Block</div>
      <div class="card"><div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px">
        ${Array.from({length:4},(_,w)=>Array.from({length:4},(_,d)=>{const done=S.sessions.some(s=>s.week===w&&s.day===d);return `<div style="height:32px;border-radius:6px;background:${done?"var(--red)":"var(--border)"};display:flex;align-items:center;justify-content:center;font-size:10px;color:${done?"white":"var(--muted)"}">W${w+1}D${d+1}</div>`;}).join("")).join("")}
      </div></div>
    </div>
  </div>

  <!-- LOG PAGE -->
  <div class="page${page==="log"?" active":""}" id="page-log">
    <div style="margin-top:16px">
      <div class="section-title">📋 Session Log</div>
      ${S.sessions.length===0?`<div class="empty"><div style="font-size:40px;margin-bottom:12px">📋</div>No sessions logged yet.</div>`
      :S.sessions.map(s=>`<div class="log-entry"><div style="font-size:11px;color:var(--muted);margin-bottom:4px">${s.date} · ${WEEKS[s.week]}</div><div style="font-family:impact,'Arial Black',sans-serif;font-size:18px;letter-spacing:1px;margin-bottom:${s.notes?6:0}px">${s.dayName}</div>${s.notes?`<div style="font-size:13px;color:var(--muted);margin-bottom:6px">"${s.notes}"</div>`:""}<div style="font-size:12px;color:var(--muted)">${s.exercises.length} exercises</div></div>`).join("")}
    </div>
  </div>

  <!-- SETTINGS PAGE -->
  <div class="page${page==="settings"?" active":""}" id="page-settings">
    <div style="margin-top:16px">
      <div class="section-title">⚙️ Settings</div>
      <div class="card">
        <div class="setting-row"><div><div style="font-size:14px;font-weight:500">Athlete Name</div></div><input class="f-input" style="width:140px" value="${S.settings.name}" oninput="saveSetting('name',this.value)"></div>
        <div class="setting-row"><div><div style="font-size:14px;font-weight:500">Block Name</div></div><input class="f-input" style="width:140px" value="${S.settings.block}" oninput="saveSetting('block',this.value)"></div>
        <div class="setting-row"><div style="font-size:14px;font-weight:500">Rest Timer Auto-show</div><div id="timerToggle" class="toggle${S.settings.timer?" on":""}" onclick="toggleTimer()"><div class="toggle-knob" style="left:${S.settings.timer?"23":"3"}px"></div></div></div>
      </div>
      <div class="section-title">🎯 Comp Goals</div>
      <div class="card">
        ${[["Squat","squat"],["Bench","bench"],["Deadlift","dead"]].map(([lbl,key])=>`<div class="setting-row"><div style="font-size:14px;font-weight:500">${lbl} Goal</div><input class="f-input" type="number" style="width:90px;text-align:center" value="${S.goals[key]}" oninput="saveGoal('${key}',this.value)"></div>`).join("")}
      </div>
      <div class="section-title">📊 Current PRs</div>
      <div class="card">
        ${[["Squat","squat"],["Bench","bench"],["Deadlift","dead"]].map(([lbl,key])=>`<div class="setting-row"><div style="font-size:14px;font-weight:500">${lbl} PR</div><input class="f-input" type="number" style="width:90px;text-align:center" value="${S.prs[key]}" oninput="savePR('${key}',this.value)"></div>`).join("")}
      </div>
      <div class="section-title">💾 Backup & Restore</div>
      <div class="card">
        <div style="font-size:12px;color:var(--muted);margin-bottom:10px">Copy your data as a backup, or paste to restore.</div>
        <button class="btn btn-outline" style="margin-top:0" onclick="copyBackup()">📋 Copy Data to Clipboard</button>
        <div style="font-size:12px;color:var(--muted);margin:12px 0 6px">Restore from backup:</div>
        <textarea id="restoreInput" rows="3" placeholder="Paste backup data here..."></textarea>
        <button class="btn btn-gold" onclick="restoreBackup()">Restore Data</button>
      </div>
      <div class="section-title">🗑️ Data</div>
      <div class="card">
        <button class="btn btn-danger" style="margin-top:0" onclick="if(confirm('Clear all session logs and set data?')){S={...DS(),...{settings:S.settings,goals:S.goals,prs:S.prs}};save();render();}">Clear All Data</button>
      </div>
    </div>
  </div>`;
}

load();render();
</script>
</body>
</html>
